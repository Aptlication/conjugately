<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    
    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- French Flag Colors -->
    <linearGradient id="flagGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#002395;stop-opacity:0.8" />
      <stop offset="33%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="67%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ed2939;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Main Background -->
  <rect width="1024" height="500" fill="url(#bgGradient)"/>
  
  <!-- French Flag Accent Strip -->
  <rect x="0" y="0" width="1024" height="8" fill="url(#flagGradient)"/>
  <rect x="0" y="492" width="1024" height="8" fill="url(#flagGradient)"/>
  
  <!-- Left Side Content -->
  <g id="leftContent">
    <!-- App Icon Placeholder (circular) -->
    <circle cx="120" cy="150" r="45" fill="#4338ca" stroke="#fbbf24" stroke-width="3"/>
    <text x="120" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="24">FVM</text>
    
    <!-- Main Title -->
    <text x="60" y="240" fill="url(#textGradient)" font-family="Arial, sans-serif" font-weight="bold" font-size="42">French Verb Master</text>
    
    <!-- Tagline -->
    <text x="60" y="275" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="22">Master French verbs, get fluent quicker</text>
    <text x="60" y="305" fill="#9ca3af" font-family="Arial, sans-serif" font-size="18">Context + Repetition Learning Method</text>
    
    <!-- Key Features -->
    <g id="features" transform="translate(60, 340)">
      <circle cx="8" cy="8" r="4" fill="#10b981"/>
      <text x="20" y="12" fill="white" font-family="Arial, sans-serif" font-size="16">AI-Powered Quizzes</text>
      
      <circle cx="8" cy="32" r="4" fill="#10b981"/>
      <text x="20" y="36" fill="white" font-family="Arial, sans-serif" font-size="16">4-Tier Difficulty System</text>
      
      <circle cx="8" cy="56" r="4" fill="#10b981"/>
      <text x="20" y="60" fill="white" font-family="Arial, sans-serif" font-size="16">Complete Sentence Context</text>
      
      <circle cx="8" cy="80" r="4" fill="#10b981"/>
      <text x="20" y="84" fill="white" font-family="Arial, sans-serif" font-size="16">Ages 9 to Adults</text>
    </g>
  </g>
  
  <!-- Right Side - Phone Mockup -->
  <g id="phoneMockup" transform="translate(650, 80)">
    <!-- Phone Frame -->
    <rect x="0" y="0" width="280" height="340" rx="25" fill="#1f2937" stroke="#374151" stroke-width="2"/>
    <rect x="15" y="30" width="250" height="280" rx="15" fill="#111827"/>
    
    <!-- Screen Content -->
    <rect x="25" y="40" width="230" height="40" rx="8" fill="#4338ca"/>
    <text x="140" y="62" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="14">French Verb Quiz</text>
    
    <!-- Question Area -->
    <rect x="25" y="90" width="230" height="60" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="35" y="108" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="11">Translate to French:</text>
    <text x="35" y="125" fill="#fbbf24" font-family="Arial, sans-serif" font-weight="bold" font-size="12">"I am learning French"</text>
    
    <!-- Answer Options -->
    <rect x="25" y="160" width="230" height="30" rx="6" fill="#065f46" stroke="#10b981" stroke-width="1"/>
    <text x="35" y="177" fill="#d1fae5" font-family="Arial, sans-serif" font-size="11">A) J'apprends le français</text>
    
    <rect x="25" y="195" width="230" height="30" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
    <text x="35" y="212" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">B) Je suis français</text>
    
    <rect x="25" y="230" width="230" height="30" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
    <text x="35" y="247" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">C) J'ai appris français</text>
    
    <rect x="25" y="265" width="230" height="30" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
    <text x="35" y="282" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">D) Je vais apprendre</text>
  </g>
  
  <!-- Bottom Banner -->
  <rect x="0" y="440" width="1024" height="60" fill="rgba(0,0,0,0.3)"/>
  <text x="512" y="465" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">Download Now - Start Your French Fluency Journey</text>
  <text x="512" y="485" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="14">Join Thousands of Successful French Learners</text>
  
  <!-- Decorative Elements -->
  <g id="stars">
    <polygon points="900,120 905,130 915,130 907,137 910,147 900,142 890,147 893,137 885,130 895,130" fill="#fbbf24" opacity="0.8"/>
    <polygon points="950,160 953,167 960,167 955,171 957,178 950,175 943,178 945,171 940,167 947,167" fill="#fbbf24" opacity="0.6"/>
    <polygon points="920,200 923,207 930,207 925,211 927,218 920,215 913,218 915,211 910,207 917,207" fill="#fbbf24" opacity="0.7"/>
  </g>
</svg>