<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conjugately</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b 0%, #7c3aed 50%, #1e293b 100%);
            color: white;
            font-family: Arial, sans-serif;
            padding: 48px 16px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 48px; }
        .header h1 { font-size: 48px; font-weight: bold; margin-bottom: 16px; }
        .header p { font-size: 20px; color: #cbd5e1; max-width: 600px; margin: 0 auto; }
        .glass-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 32px;
        }
        .section { margin-bottom: 32px; }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-label { font-size: 18px; font-weight: 600; }
        .choose-btn {
            padding: 8px 16px;
            background: linear-gradient(to right, #7c3aed, #ec4899);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .choose-btn:disabled {
            background: #374151;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .select {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
        }
        .select:disabled { opacity: 0.5; }
        .select option { background: #1f2937; color: white; }
        .master-btn {
            width: 100%;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to right, #4f46e5, #7c3aed, #ec4899);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            margin-bottom: 24px;
            transition: transform 0.2s;
        }
        .master-btn:hover { transform: scale(1.05); }
        .start-btn {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .start-btn.enabled {
            background: linear-gradient(to right, #10b981, #3b82f6);
        }
        .start-btn.disabled {
            background: #374151;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .preview {
            max-width: 600px;
            margin: 32px auto 0;
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .preview h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .preview p { color: #6ee7b7; }
        .quiz-container { display: none; }
        .quiz-header { margin-bottom: 24px; }
        .quiz-progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .progress-bar {
            width: 100%;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            height: 8px;
        }
        .progress-fill {
            background: linear-gradient(to right, #10b981, #3b82f6);
            height: 8px;
            border-radius: 8px;
            transition: width 0.3s;
        }
        .question { margin-bottom: 24px; }
        .question h2 { font-size: 24px; font-weight: bold; margin-bottom: 16px; }
        .hint {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            color: #93c5fd;
        }
        .answers { margin-bottom: 32px; }
        .answer {
            width: 100%;
            padding: 16px;
            text-align: left;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            margin-bottom: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        .answer.selected {
            border: 2px solid #7c3aed;
            background: rgba(124, 58, 237, 0.2);
        }
        .answer-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 14px;
            font-weight: bold;
        }
        .rationale {
            margin-bottom: 24px;
            padding: 16px;
            border-radius: 12px;
        }
        .rationale.correct {
            border: 1px solid rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }
        .rationale.incorrect {
            border: 1px solid rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }
        .quiz-actions {
            display: flex;
            justify-content: space-between;
        }
        .secondary-btn {
            padding: 12px 24px;
            color: #94a3b8;
            background: transparent;
            border: 1px solid #475569;
            border-radius: 12px;
            cursor: pointer;
        }
        .primary-btn {
            padding: 12px 32px;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .primary-btn.enabled {
            background: linear-gradient(to right, #10b981, #3b82f6);
        }
        .primary-btn.disabled {
            background: #374151;
            cursor: not-allowed;
        }
        .results { display: none; text-align: center; }
        .score { font-size: 64px; font-weight: bold; margin-bottom: 8px; }
        .score-text { font-size: 20px; color: #cbd5e1; margin-bottom: 32px; }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal-content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
            margin: 16px;
        }
        .modal h3 { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 24px; }
        .difficulty-btn {
            width: 100%;
            padding: 16px;
            text-align: left;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
            border: 1px solid;
        }
        .difficulty-easy { background: rgba(16, 185, 129, 0.2); border-color: rgba(16, 185, 129, 0.3); }
        .difficulty-moderate { background: rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.3); }
        .difficulty-hard { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.3); }
        .difficulty-title { font-weight: 600; font-size: 18px; margin-bottom: 4px; }
        .difficulty-desc { color: #cbd5e1; font-size: 14px; }
        .loading { display: none; text-align: center; align-items: center; justify-content: center; min-height: 100vh; }
        .spinner {
            width: 64px;
            height: 64px;
            border: 4px solid #7c3aed;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Configuration Screen -->
        <div id="config" class="config-container">
            <div class="header">
                <h1>Conjugately</h1>
                <p>Master French verb conjugations with personalized quizzes. Select your verb, time frame, and tense type to generate a 20-question quiz.</p>
            </div>

            <div style="text-align: center; margin-bottom: 24px;">
                <button class="master-btn" onclick="showDifficultyModal()">🎲 Choose All for Me</button>
            </div>

            <div class="glass-card">
                <div class="section">
                    <div class="section-header">
                        <label class="section-label">1. Choose a French Verb</label>
                        <button class="choose-btn" onclick="chooseVerb()">Choose for me</button>
                    </div>
                    <select id="verbSelect" class="select" onchange="updateSelections()">
                        <option value="">Select a verb...</option>
                        <option value="être">être</option>
                        <option value="avoir">avoir</option>
                        <option value="faire">faire</option>
                        <option value="dire">dire</option>
                        <option value="aller">aller</option>
                        <option value="voir">voir</option>
                        <option value="savoir">savoir</option>
                        <option value="pouvoir">pouvoir</option>
                        <option value="vouloir">vouloir</option>
                        <option value="venir">venir</option>
                    </select>
                </div>

                <div class="section">
                    <div class="section-header">
                        <label class="section-label">2. Choose Time Frame</label>
                        <button id="timeFrameBtn" class="choose-btn" onclick="chooseTimeFrame()" disabled>Choose for me</button>
                    </div>
                    <select id="timeFrameSelect" class="select" onchange="updateSelections()" disabled>
                        <option value="">Select time frame...</option>
                        <option value="Past">Past</option>
                        <option value="Present">Present</option>
                        <option value="Future">Future</option>
                    </select>
                </div>

                <div class="section">
                    <div class="section-header">
                        <label class="section-label">3. Choose Specific Tense</label>
                        <button id="tenseBtn" class="choose-btn" onclick="chooseTense()" disabled>Choose for me</button>
                    </div>
                    <select id="tenseSelect" class="select" onchange="updateSelections()" disabled>
                        <option value="">Select tense type...</option>
                    </select>
                </div>

                <button id="startBtn" class="start-btn disabled" onclick="startQuiz()" disabled>
                    Complete all selections to start quiz
                </button>
            </div>

            <div id="preview" class="preview" style="display: none;">
                <h3>Quiz Preview</h3>
                <p id="previewText"></p>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading" class="loading">
            <div>
                <div class="spinner"></div>
                <p style="font-size: 20px; margin-bottom: 8px;">Generating your quiz...</p>
                <p id="loadingText" style="color: #a78bfa;"></p>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz" class="quiz-container">
            <div class="glass-card">
                <div class="quiz-header">
                    <div class="quiz-progress">
                        <span id="questionNumber">Question 1 of 20</span>
                        <button onclick="toggleHint()" style="color: #a78bfa; background: none; border: none; font-size: 14px; cursor: pointer;">
                            <span id="hintText">Show Hint</span>
                        </button>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill" style="width: 5%;"></div>
                    </div>
                </div>

                <div class="question">
                    <h2 id="questionText"></h2>
                    <div id="hintBox" class="hint" style="display: none;">
                        <p id="hintContent"></p>
                    </div>
                </div>

                <div id="answers" class="answers"></div>

                <div id="rationale" class="rationale" style="display: none;">
                    <p id="rationaleText"></p>
                </div>

                <div class="quiz-actions">
                    <button class="secondary-btn" onclick="startOver()">Start Over</button>
                    <button id="nextBtn" class="primary-btn disabled" onclick="nextQuestion()" disabled>Next Question</button>
                </div>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results" class="results">
            <div class="glass-card">
                <h2 style="font-size: 36px; font-weight: bold; margin-bottom: 24px;">Quiz Complete!</h2>
                <div class="score" id="scorePercent">0%</div>
                <p class="score-text" id="scoreText">You got 0 out of 20 questions correct</p>
                <button class="primary-btn enabled" onclick="startOver()">Try Another Quiz</button>
            </div>
        </div>

        <!-- Difficulty Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <h3>Choose Difficulty Level</h3>
                <button class="difficulty-btn difficulty-easy" onclick="selectDifficulty('Easy')">
                    <div class="difficulty-title" style="color: #6ee7b7;">🟢 Easy</div>
                    <div class="difficulty-desc">Basic verbs (être, avoir, faire) • Present tense only</div>
                </button>
                <button class="difficulty-btn difficulty-moderate" onclick="selectDifficulty('Moderate')">
                    <div class="difficulty-title" style="color: #fbbf24;">🟡 Moderate</div>
                    <div class="difficulty-desc">6 common verbs • Present, past, and future tenses</div>
                </button>
                <button class="difficulty-btn difficulty-hard" onclick="selectDifficulty('Difficult')">
                    <div class="difficulty-title" style="color: #f87171;">🔴 Difficult</div>
                    <div class="difficulty-desc">All 10 verbs • All tenses and time frames</div>
                </button>
                <button class="secondary-btn" onclick="hideDifficultyModal()" style="width: 100%; margin-top: 12px;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const TIME_FRAMES = {
            "Past": ["Passé Composé", "Imparfait", "Plus-que-parfait", "Passé Simple"],
            "Present": ["Présent", "Présent Progressif"],
            "Future": ["Futur Simple", "Futur Antérieur"]
        };

        const FRENCH_VERBS = ["être", "avoir", "faire", "dire", "aller", "voir", "savoir", "pouvoir", "vouloir", "venir"];

        let currentQuiz = null;
        let currentQuestion = 0;
        let userAnswers = {};
        let selectedAnswer = null;
        let showingHint = false;

        function updateSelections() {
            const verb = document.getElementById('verbSelect').value;
            const timeFrame = document.getElementById('timeFrameSelect').value;
            const tense = document.getElementById('tenseSelect').value;

            // Enable/disable time frame
            const timeFrameSelect = document.getElementById('timeFrameSelect');
            const timeFrameBtn = document.getElementById('timeFrameBtn');
            if (verb) {
                timeFrameSelect.disabled = false;
                timeFrameBtn.disabled = false;
            } else {
                timeFrameSelect.disabled = true;
                timeFrameBtn.disabled = true;
                timeFrameSelect.value = '';
            }

            // Update tense options
            const tenseSelect = document.getElementById('tenseSelect');
            const tenseBtn = document.getElementById('tenseBtn');
            tenseSelect.innerHTML = '<option value="">Select tense type...</option>';
            
            if (timeFrame && TIME_FRAMES[timeFrame]) {
                TIME_FRAMES[timeFrame].forEach(tense => {
                    const option = document.createElement('option');
                    option.value = tense;
                    option.textContent = tense;
                    tenseSelect.appendChild(option);
                });
                tenseSelect.disabled = false;
                tenseBtn.disabled = false;
            } else {
                tenseSelect.disabled = true;
                tenseBtn.disabled = true;
                tenseSelect.value = '';
            }

            // Update start button
            const startBtn = document.getElementById('startBtn');
            const preview = document.getElementById('preview');
            
            if (verb && timeFrame && tense) {
                startBtn.className = 'start-btn enabled';
                startBtn.disabled = false;
                startBtn.textContent = `Start ${verb} Quiz (${tense})`;
                
                preview.style.display = 'block';
                document.getElementById('previewText').innerHTML = `Ready to generate 20 questions for <strong>${verb}</strong> conjugations in <strong>${tense}</strong>`;
            } else {
                startBtn.className = 'start-btn disabled';
                startBtn.disabled = true;
                startBtn.textContent = 'Complete all selections to start quiz';
                preview.style.display = 'none';
            }
        }

        function chooseVerb() {
            const randomVerb = FRENCH_VERBS[Math.floor(Math.random() * FRENCH_VERBS.length)];
            document.getElementById('verbSelect').value = randomVerb;
            updateSelections();
        }

        function chooseTimeFrame() {
            const timeFrames = Object.keys(TIME_FRAMES);
            const randomTimeFrame = timeFrames[Math.floor(Math.random() * timeFrames.length)];
            document.getElementById('timeFrameSelect').value = randomTimeFrame;
            document.getElementById('tenseSelect').value = '';
            updateSelections();
        }

        function chooseTense() {
            const timeFrame = document.getElementById('timeFrameSelect').value;
            if (timeFrame) {
                const tenses = TIME_FRAMES[timeFrame];
                const randomTense = tenses[Math.floor(Math.random() * tenses.length)];
                document.getElementById('tenseSelect').value = randomTense;
                updateSelections();
            }
        }

        function showDifficultyModal() {
            document.getElementById('modal').style.display = 'flex';
        }

        function hideDifficultyModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function selectDifficulty(level) {
            const configs = {
                "Easy": { verbs: ["être", "avoir", "faire"], timeFrames: ["Present"], tenses: ["Présent"] },
                "Moderate": { verbs: ["être", "avoir", "faire", "dire", "aller", "voir"], timeFrames: ["Present", "Past"], tenses: ["Présent", "Passé Composé", "Imparfait", "Futur Simple"] },
                "Difficult": { verbs: FRENCH_VERBS, timeFrames: Object.keys(TIME_FRAMES), tenses: Object.values(TIME_FRAMES).flat() }
            };

            const config = configs[level];
            const randomVerb = config.verbs[Math.floor(Math.random() * config.verbs.length)];
            const randomTimeFrame = config.timeFrames[Math.floor(Math.random() * config.timeFrames.length)];
            
            let availableTenses = [];
            if (level === "Easy") {
                availableTenses = config.tenses;
            } else {
                const timeFrameTenses = TIME_FRAMES[randomTimeFrame] || [];
                availableTenses = timeFrameTenses.filter(tense => config.tenses.includes(tense));
            }
            
            const randomTense = availableTenses[Math.floor(Math.random() * availableTenses.length)];

            document.getElementById('verbSelect').value = randomVerb;
            document.getElementById('timeFrameSelect').value = randomTimeFrame;
            
            updateSelections();
            
            setTimeout(() => {
                document.getElementById('tenseSelect').value = randomTense;
                updateSelections();
            }, 100);

            hideDifficultyModal();
        }

        async function startQuiz() {
            const verb = document.getElementById('verbSelect').value;
            const timeFrame = document.getElementById('timeFrameSelect').value;
            const tense = document.getElementById('tenseSelect').value;

            if (!verb || !timeFrame || !tense) return;

            document.getElementById('config').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loadingText').textContent = `Creating 20 questions for ${verb} in ${tense}`;

            try {
                const timeFrameMapping = { "Past": "past", "Present": "present", "Future": "future" };
                const response = await fetch('/api/get-quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        verb: verb,
                        timeFrame: timeFrameMapping[timeFrame],
                        tenseType: tense
                    })
                });

                const data = await response.json();
                if (data.success) {
                    currentQuiz = data.quiz.questions;
                    currentQuestion = 0;
                    userAnswers = {};
                    selectedAnswer = null;
                    showingHint = false;
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('quiz').style.display = 'block';
                    displayQuestion();
                } else {
                    alert(`Quiz not available: ${data.error}`);
                    showConfig();
                }
            } catch (error) {
                alert('Failed to load quiz. Please try again.');
                showConfig();
            }
        }

        function displayQuestion() {
            const question = currentQuiz[currentQuestion];
            
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1} of ${currentQuiz.length}`;
            document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / currentQuiz.length) * 100}%`;
            document.getElementById('questionText').textContent = question.question;
            document.getElementById('hintContent').textContent = question.hint;
            
            const answersDiv = document.getElementById('answers');
            answersDiv.innerHTML = '';
            
            question.answerOptions.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'answer';
                button.onclick = () => selectAnswer(index);
                button.innerHTML = `
                    <span class="answer-letter">${String.fromCharCode(65 + index)}</span>
                    ${option.text}
                `;
                answersDiv.appendChild(button);
            });

            document.getElementById('rationale').style.display = 'none';
            document.getElementById('nextBtn').className = 'primary-btn disabled';
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('hintBox').style.display = 'none';
            document.getElementById('hintText').textContent = 'Show Hint';
            showingHint = false;
            selectedAnswer = null;
        }

        function selectAnswer(index) {
            selectedAnswer = index;
            userAnswers[currentQuestion] = index;
            
            const answers = document.querySelectorAll('.answer');
            answers.forEach((answer, i) => {
                answer.className = i === index ? 'answer selected' : 'answer';
            });

            const question = currentQuiz[currentQuestion];
            const option = question.answerOptions[index];
            const rationale = document.getElementById('rationale');
            const rationaleText = document.getElementById('rationaleText');
            
            rationale.style.display = 'block';
            rationale.className = option.isCorrect ? 'rationale correct' : 'rationale incorrect';
            rationaleText.textContent = `📝 ${option.rationale}`;

            const nextBtn = document.getElementById('nextBtn');
            nextBtn.className = 'primary-btn enabled';
            nextBtn.disabled = false;
            nextBtn.textContent = currentQuestion === currentQuiz.length - 1 ? 'Finish Quiz' : 'Next Question';
        }

        function toggleHint() {
            showingHint = !showingHint;
            document.getElementById('hintBox').style.display = showingHint ? 'block' : 'none';
            document.getElementById('hintText').textContent = showingHint ? 'Hide Hint' : 'Show Hint';
        }

        function nextQuestion() {
            if (selectedAnswer === null) return;
            
            if (currentQuestion < currentQuiz.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            let correctAnswers = 0;
            currentQuiz.forEach((question, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== undefined && question.answerOptions[userAnswer]?.isCorrect) {
                    correctAnswers++;
                }
            });

            const percentage = Math.round((correctAnswers / currentQuiz.length) * 100);
            
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('scorePercent').textContent = `${percentage}%`;
            document.getElementById('scoreText').textContent = `You got ${correctAnswers} out of ${currentQuiz.length} questions correct`;
        }

        function showConfig() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('config').style.display = 'block';
        }

        function startOver() {
            showConfig();
        }

        // Initialize
        updateSelections();
    </script>
</body>
</html>
