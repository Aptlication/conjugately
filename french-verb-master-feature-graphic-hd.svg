<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <!-- High-Resolution Definitions -->
  <defs>
    <!-- French Flag Background -->
    <linearGradient id="frenchFlag" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#002395;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#002395;stop-opacity:1" />
      <stop offset="33.33%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="66.66%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="66.66%" style="stop-color:#ed2939;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ed2939;stop-opacity:1" />
    </linearGradient>
    
    <!-- Premium Dark Overlay -->
    <linearGradient id="darkOverlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.7" />
    </linearGradient>
    
    <!-- Premium Gold Text Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Diamond Shadow Filter -->
    <filter id="diamondShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    
    <!-- Phone Shadow Filter -->
    <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="8" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Main Background - French Flag -->
  <rect width="1024" height="500" fill="url(#frenchFlag)"/>
  
  <!-- Premium Dark Overlay for Text Readability -->
  <rect width="1024" height="500" fill="url(#darkOverlay)"/>
  
  <!-- Left Side Content -->
  <g id="leftContent">
    <!-- High-Quality Diamond VM Logo -->
    <g transform="translate(140, 160)">
      <!-- Diamond Shadow -->
      <polygon points="0,-70 70,0 0,70 -70,0" fill="rgba(0,0,0,0.2)" transform="translate(4,4)"/>
      <!-- White Diamond Border (Outer) -->
      <polygon points="0,-70 70,0 0,70 -70,0" fill="white"/>
      <!-- Blue Diamond Background (Inner) -->
      <polygon points="0,-62 62,0 0,62 -62,0" fill="#002395"/>
      <!-- VM Text - Ultra High Quality -->
      <text x="0" y="15" text-anchor="middle" fill="white" font-family="Times New Roman, Times, serif" font-weight="900" font-size="48" letter-spacing="3px" style="text-rendering: optimizeLegibility;">VM</text>
    </g>
    
    <!-- Premium Title -->
    <text x="80" y="280" fill="url(#goldGradient)" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="52" style="text-rendering: optimizeLegibility;">French Verb Master</text>
    
    <!-- Enhanced Tagline -->
    <text x="80" y="320" fill="#ffffff" font-family="Arial, sans-serif" font-weight="600" font-size="26" style="text-rendering: optimizeLegibility;">Master French verbs, get fluent quicker</text>
    <text x="80" y="350" fill="#d1d5db" font-family="Arial, sans-serif" font-weight="500" font-size="20" style="text-rendering: optimizeLegibility;">Context + Repetition Learning Method</text>
    
    <!-- Enhanced Key Features -->
    <g id="features" transform="translate(80, 385)">
      <!-- Feature bullets with enhanced styling -->
      <circle cx="10" cy="10" r="5" fill="#10b981"/>
      <text x="25" y="16" fill="white" font-family="Arial, sans-serif" font-weight="600" font-size="18" style="text-rendering: optimizeLegibility;">AI-Powered Quizzes</text>
      
      <circle cx="10" cy="38" r="5" fill="#10b981"/>
      <text x="25" y="44" fill="white" font-family="Arial, sans-serif" font-weight="600" font-size="18" style="text-rendering: optimizeLegibility;">4-Tier Difficulty System</text>
      
      <circle cx="10" cy="66" r="5" fill="#10b981"/>
      <text x="25" y="72" fill="white" font-family="Arial, sans-serif" font-weight="600" font-size="18" style="text-rendering: optimizeLegibility;">Complete Sentence Context</text>
      
      <circle cx="300" cy="10" r="5" fill="#10b981"/>
      <text x="315" y="16" fill="white" font-family="Arial, sans-serif" font-weight="600" font-size="18" style="text-rendering: optimizeLegibility;">Ages 9 to Adults</text>
    </g>
  </g>
  
  <!-- Enhanced Right Side - Premium Phone Mockup -->
  <g id="phoneMockup" transform="translate(640, 60)" filter="url(#phoneShadow)">
    <!-- Premium Phone Frame -->
    <rect x="0" y="0" width="320" height="380" rx="35" fill="#1f2937" stroke="#4b5563" stroke-width="3"/>
    <rect x="20" y="40" width="280" height="320" rx="20" fill="#0f172a"/>
    
    <!-- Enhanced Screen Content -->
    <!-- Header Bar -->
    <rect x="30" y="50" width="260" height="50" rx="12" fill="#4338ca"/>
    <text x="160" y="78" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="700" font-size="16" style="text-rendering: optimizeLegibility;">French Verb Quiz</text>
    
    <!-- Question Area Enhanced -->
    <rect x="30" y="110" width="260" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="40" y="130" fill="#cbd5e1" font-family="Arial, sans-serif" font-weight="500" font-size="13" style="text-rendering: optimizeLegibility;">Translate to French:</text>
    <text x="40" y="155" fill="#fbbf24" font-family="Arial, sans-serif" font-weight="700" font-size="15" style="text-rendering: optimizeLegibility;">"I am learning French every day"</text>
    
    <!-- Enhanced Answer Options -->
    <rect x="30" y="200" width="260" height="35" rx="8" fill="#065f46" stroke="#10b981" stroke-width="2"/>
    <circle cx="45" cy="217.5" r="6" fill="#10b981"/>
    <text x="60" y="222" fill="#d1fae5" font-family="Arial, sans-serif" font-weight="600" font-size="13" style="text-rendering: optimizeLegibility;">A) J'apprends le français chaque jour</text>
    
    <rect x="30" y="245" width="260" height="35" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
    <circle cx="45" cy="262.5" r="6" fill="#6b7280"/>
    <text x="60" y="267" fill="#d1d5db" font-family="Arial, sans-serif" font-weight="500" font-size="13" style="text-rendering: optimizeLegibility;">B) Je suis français chaque jour</text>
    
    <rect x="30" y="290" width="260" height="35" rx="8" fill="#374151" stroke="#6b7280" stroke-width="1"/>
    <circle cx="45" cy="307.5" r="6" fill="#6b7280"/>
    <text x="60" y="312" fill="#d1d5db" font-family="Arial, sans-serif" font-weight="500" font-size="13" style="text-rendering: optimizeLegibility;">C) J'ai appris français hier</text>
  </g>
  
  <!-- Enhanced Bottom Banner -->
  <rect x="0" y="430" width="1024" height="70" fill="rgba(0,0,0,0.4)"/>
  <text x="512" y="455" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="800" font-size="20" style="text-rendering: optimizeLegibility;">Download Now - Start Your French Fluency Journey</text>
  <text x="512" y="480" text-anchor="middle" fill="#d1d5db" font-family="Arial, sans-serif" font-weight="600" font-size="16" style="text-rendering: optimizeLegibility;">Join Thousands of Successful French Learners</text>
  
  <!-- Enhanced Decorative Stars -->
  <g id="premiumStars">
    <g transform="translate(880, 140)">
      <polygon points="0,-12 8,0 0,12 -8,0" fill="#ffd700" opacity="0.9"/>
      <polygon points="0,-8 5,0 0,8 -5,0" fill="#fff" opacity="0.8"/>
    </g>
    <g transform="translate(920, 180)">
      <polygon points="0,-10 7,0 0,10 -7,0" fill="#ffd700" opacity="0.8"/>
      <polygon points="0,-6 4,0 0,6 -4,0" fill="#fff" opacity="0.7"/>
    </g>
    <g transform="translate(900, 220)">
      <polygon points="0,-8 6,0 0,8 -6,0" fill="#ffd700" opacity="0.7"/>
      <polygon points="0,-5 3,0 0,5 -3,0" fill="#fff" opacity="0.6"/>
    </g>
  </g>
</svg>