<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="1280" viewBox="0 0 720 1280" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="720" height="1280" fill="#0f172a"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="720" height="100" fill="#4338ca"/>
  <text x="360" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18">Beginner Quiz</text>
  <text x="360" y="65" text-anchor="middle" fill="#c7d2fe" font-family="Arial, sans-serif" font-size="16">Question 7 of 20</text>
  <text x="360" y="85" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="14">Verb: être (to be) • Present Tense</text>
  
  <!-- Progress Bar -->
  <rect x="40" y="120" width="640" height="8" rx="4" fill="#374151"/>
  <rect x="40" y="120" width="224" height="8" rx="4" fill="#10b981"/>
  
  <!-- Question Section -->
  <rect x="40" y="160" width="640" height="200" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="200" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">Translate to French:</text>
  <text x="60" y="240" fill="#fbbf24" font-family="Arial, sans-serif" font-weight="bold" font-size="24">"She is a talented student"</text>
  
  <!-- Context Hint -->
  <rect x="60" y="270" width="600" height="60" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="70" y="295" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="14">💡 Hint: Remember feminine agreement</text>
  <text x="70" y="315" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Use 'elle est' for 'she is' + feminine adjective</text>
  
  <!-- Answer Options -->
  <rect x="40" y="400" width="640" height="80" rx="12" fill="#065f46" stroke="#10b981" stroke-width="2"/>
  <circle cx="80" cy="440" r="12" fill="#10b981"/>
  <text x="80" y="446" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">A</text>
  <text x="120" y="435" fill="#d1fae5" font-family="Arial, sans-serif" font-weight="bold" font-size="20">Elle est une étudiante talentueuse</text>
  <text x="120" y="460" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="14">✓ Correct! Proper feminine agreement</text>
  
  <rect x="40" y="500" width="640" height="60" rx="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="80" cy="530" r="12" fill="#6b7280"/>
  <text x="80" y="536" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">B</text>
  <text x="120" y="540" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18">Elle est un étudiant talentueux</text>
  
  <rect x="40" y="580" width="640" height="60" rx="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="80" cy="610" r="12" fill="#6b7280"/>
  <text x="80" y="616" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">C</text>
  <text x="120" y="620" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18">Il est une étudiante talentueuse</text>
  
  <rect x="40" y="660" width="640" height="60" rx="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="80" cy="690" r="12" fill="#6b7280"/>
  <text x="80" y="696" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="16">D</text>
  <text x="120" y="700" fill="#d1d5db" font-family="Arial, sans-serif" font-size="18">Elle être une étudiante talentueuse</text>
  
  <!-- Explanation Box -->
  <rect x="40" y="750" width="640" height="120" rx="12" fill="#1e293b" stroke="#4338ca" stroke-width="2"/>
  <text x="60" y="780" fill="#c7d2fe" font-family="Arial, sans-serif" font-weight="bold" font-size="16">📖 Grammar Explanation:</text>
  <text x="60" y="805" fill="white" font-family="Arial, sans-serif" font-size="14">"Elle est" = "She is" (feminine subject)</text>
  <text x="60" y="825" fill="white" font-family="Arial, sans-serif" font-size="14">"talentueuse" = feminine form of "talented"</text>
  <text x="60" y="845" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14">Adjectives must agree with subject gender in French</text>
  
  <!-- Action Buttons -->
  <rect x="40" y="900" width="300" height="60" rx="12" fill="#6b7280"/>
  <text x="190" y="940" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="18">⬅ Previous</text>
  
  <rect x="380" y="900" width="300" height="60" rx="12" fill="#059669"/>
  <text x="530" y="940" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="bold" font-size="18">Next ➡</text>
  
  <!-- Score Display -->
  <rect x="40" y="1000" width="640" height="80" rx="12" fill="#1e293b"/>
  <text x="180" y="1030" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Current Score</text>
  <text x="180" y="1055" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-weight="bold" font-size="24">6/7 Correct</text>
  
  <text x="540" y="1030" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="16">Time Remaining</text>
  <text x="540" y="1055" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-weight="bold" font-size="24">8:42</text>
</svg>